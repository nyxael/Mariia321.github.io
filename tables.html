
<!DOCTYPE html>
<html>
<head>
    <title>Table Assignment</title>
    <style>
        table, tr, td, th {
            border: 1px solid black;
        }
    </style>
</head>

<body>

<table>
    <caption>Smartphone Comparison</caption>

    <thead>
        <tr>
            <th colspan="3">Phone Features Overview</th>
        </tr>
        <tr>
            <th>Phone</th>
            <th>Price ($)</th>
            <th>Camera Quality</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>Phone A</td>
            <td>500</td>
            <td>Good</td>
        </tr>

        <tr>
            <td>Phone B</td>
            <td>700</td>
            <td>Very Good</td>
        </tr>

        <tr>
            <td>Phone C</td>
            <td>900</td>
            <td>Excellent</td>
        </tr>
    </tbody>
</table>

<ul>
    <li>Phone C has the best camera quality.</li>
    <li>Phone A is the cheapest option.</li>
    <li>Higher price generally means better camera quality.</li>
</ul>

</body>
</html>
